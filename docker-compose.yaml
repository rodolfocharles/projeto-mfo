services:
  db:
    image: postgres:16.1-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: mfo_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mfo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./mfo-backend
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgresql://postgres:docker@db:5432/mfo_db?schema=public
      PORT: 3333
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "until pg_isready -h db -p 5432 -U postgres; do echo 'Waiting for db...'; sleep 1; done && npm run migrate:deploy && npm start"
    volumes:
      - ./mfo-backend:/app
      - /app/node_modules # Volume anônimo para node_modules

  frontend:
    build: ./mfo-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333/api/
      API_URL: http://backend:3333/api/
    depends_on:
      - backend
    
volumes:
  pg_data:
